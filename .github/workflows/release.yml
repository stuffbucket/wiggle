name: release

# Push a tag (e.g. v0.1.0) to cut a release. This creates a draft, dispatches
# the private stuffbucket/macos-builder for the signed+notarized arm64 dmg
# (no Apple secrets live here), then publishes. See RELEASING.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Create the draft release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
              --title "Wiggle $TAG" --notes "Wiggle $TAG"
          fi

  macos-dmg:
    needs: draft
    runs-on: ubuntu-latest
    steps:
      - name: Build (or reuse) the signed .dmg and ensure it is on the draft
        env:
          BUILDER_PAT: ${{ secrets.MACOS_BUILDER_PAT }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.draft.outputs.tag }}
        run: |
          set -euo pipefail
          SRC="Wiggle.dmg"                          # what the builder uploads (<volname>.dmg)
          DST="wiggle-${TAG}-darwin-arm64.dmg"      # conforming name we ship
          has() {
            gh release view "$TAG" --repo "$REPO" --json assets \
              --jq '.assets[].name' 2>/dev/null | grep -Fxq "$1"
          }
          if has "$DST"; then echo "$DST already present — nothing to do."; exit 0; fi
          if ! has "$SRC"; then
            echo "Dispatching stuffbucket/macos-builder for ${REPO} at ${TAG}…"
            GH_TOKEN="$BUILDER_PAT" gh workflow run build.yml \
              --repo stuffbucket/macos-builder --ref main \
              -f "repo=${REPO}" -f "ref=${TAG}"
            ok=0
            for i in $(seq 1 40); do   # ~30 min cap (45s × 40)
              sleep 45
              if has "$SRC" || has "$DST"; then ok=1; break; fi
            done
            [ "$ok" -eq 1 ] || { echo "::error::Timed out waiting for ${SRC}"; exit 1; }
          fi
          tmp="$(mktemp -d)"
          gh release download "$TAG" --repo "$REPO" --pattern "$SRC" --dir "$tmp"
          mv "$tmp/$SRC" "$tmp/$DST"
          ( cd "$tmp" && shasum -a 256 "$DST" > "$DST.sha256" )
          gh release upload "$TAG" --repo "$REPO" "$tmp/$DST" "$tmp/$DST.sha256" --clobber
          gh release delete-asset "$TAG" "$SRC" --repo "$REPO" --yes 2>/dev/null || true

  publish:
    needs: [draft, macos-dmg]
    runs-on: ubuntu-latest
    steps:
      - name: Flip the draft to published
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.draft.outputs.tag }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false --latest
